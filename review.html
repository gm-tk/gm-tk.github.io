<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageForge — Visual Comparison Review</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/review-styles.css">
</head>
<body class="review-page">

    <!-- Header Bar -->
    <header class="review-header" id="review-header">
        <div class="review-header-inner">
            <div class="review-header-left">
                <a href="index.html" class="review-back-link" id="btn-back">&larr; Back to PageForge</a>
                <h1 class="review-title">PageForge Visual Comparison Review</h1>
                <span id="review-module-code" class="review-module-code"></span>
            </div>
            <div class="review-header-right">
                <label class="review-sync-toggle" for="sync-mode-toggle">
                    <input type="checkbox" id="sync-mode-toggle" />
                    <span class="review-sync-slider"></span>
                    <span class="review-sync-label">Sync</span>
                </label>
                <button id="btn-raw-html-toggle" class="btn review-raw-btn" type="button">
                    &lt;/&gt; Raw HTML
                </button>
                <button id="btn-calibration-tool" class="btn review-calibrate-btn" type="button">
                    &#128203; Calibration Tool
                </button>
            </div>
        </div>
    </header>

    <!-- Three-Panel Layout -->
    <div class="review-layout" id="review-main">

        <!-- File Map Panel (Left Sidebar) -->
        <div class="review-file-map" id="review-file-map">
            <div class="review-panel-label">File Map</div>
            <div id="file-map-list" class="file-map-list"></div>
        </div>

        <!-- PageForge HTML Panel -->
        <div class="review-panel review-panel-pageforge" id="panel-pageforge">
            <div class="review-panel-header">
                <span class="review-panel-title">PageForge Output</span>
                <span id="pageforge-filename" class="review-panel-filename"></span>
                <button class="btn btn-sm review-copy-to-snapshot hidden" id="btn-copy-pf"
                        type="button" title="Copy PageForge output to snapshot">&#128203; Copy PF</button>
            </div>
            <div class="review-panel-body" id="pageforge-panel-body">
                <iframe id="pageforge-iframe" class="review-iframe" sandbox="allow-same-origin" title="PageForge rendered output"></iframe>
                <div id="pageforge-raw" class="review-raw-view hidden">
                    <pre><code id="pageforge-raw-code"></code></pre>
                </div>
            </div>
        </div>

        <!-- Human Reference Panel -->
        <div class="review-panel review-panel-human" id="panel-human">
            <div class="review-panel-header">
                <span class="review-panel-title">Human Reference</span>
                <span id="human-filename" class="review-panel-filename"></span>
                <button class="btn btn-sm review-upload-more" id="btn-upload-more-ref"
                        type="button" title="Upload human reference files">+ Upload Files</button>
                <button class="btn btn-sm review-copy-to-snapshot hidden" id="btn-copy-human"
                        type="button" title="Copy human reference to snapshot">&#128203; Copy Human</button>
            </div>
            <div class="review-panel-body" id="human-panel-body">
                <!-- Upload prompt (shown when no matching file) -->
                <div id="human-upload-prompt" class="review-upload-prompt">
                    <div id="review-ref-dropzone" class="review-ref-dropzone">
                        <p>Drop .html reference files here<br />or click to select</p>
                        <input type="file" id="review-ref-file-input" multiple accept=".html" class="sr-only" />
                    </div>
                    <div id="review-ref-uploaded" class="review-ref-uploaded"></div>
                    <p id="human-no-match-msg" class="review-no-match-msg hidden">
                        No matching human reference file uploaded for this page.
                    </p>
                </div>
                <iframe id="human-iframe" class="review-iframe hidden" sandbox="allow-same-origin" title="Human reference rendered output"></iframe>
                <div id="human-raw" class="review-raw-view hidden">
                    <pre><code id="human-raw-code"></code></pre>
                </div>
            </div>
        </div>

        <!-- Writer Template Panel -->
        <div class="review-panel review-panel-writer" id="panel-writer">
            <div class="review-panel-header">
                <span class="review-panel-title">Writer Template</span>
                <span id="writer-filename" class="review-panel-filename"></span>
                <button class="btn btn-sm review-copy-to-snapshot hidden" id="btn-copy-wt"
                        type="button" title="Copy writer template to snapshot">&#128203; Copy WT</button>
            </div>
            <div class="review-panel-body review-writer-body" id="writer-panel-body">
                <div id="writer-content" class="review-writer-content"></div>
            </div>
        </div>

    </div>

    <!-- Toast notification -->
    <div id="toast" role="status" aria-live="polite"></div>

    <!-- Hidden file input for additional reference uploads -->
    <input type="file" id="review-ref-file-input-extra" multiple accept=".html" class="sr-only" aria-hidden="true" />

    <!-- Scripts -->
    <script src="js/review-app.js"></script>
</body>
</html>
